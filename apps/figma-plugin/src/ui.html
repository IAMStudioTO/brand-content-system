<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Brand Content System</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: Inter, system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0ede8;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    h1 {
      font-size: 28px;
      margin: 0;
    }
    p {
      margin: 0;
      color: #bdb7ae;
      line-height: 1.5;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    .primary {
      background: #c6923d;
      color: #111;
    }
    .secondary {
      background: #2a2a2a;
      color: #f0ede8;
    }
    pre {
      background: #1b1b1b;
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      min-height: 220px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Brand Content System</h1>
    <p>Plugin MVP per leggere il frame selezionato e i suoi layer.</p>

    <button id="scan" class="primary">Scansiona frame selezionato</button>
    <button id="close" class="secondary">Chiudi</button>

    <pre id="output">In attesa...</pre>
  </div>

  <script>
    const output = document.getElementById("output");
    const scanBtn = document.getElementById("scan");
    const closeBtn = document.getElementById("close");

    scanBtn.onclick = () => {
      parent.postMessage(
        {
          pluginMessage: {
            type: "SCAN_SELECTION"
          }
        },
        "*"
      );
    };

    closeBtn.onclick = () => {
      parent.postMessage(
        {
          pluginMessage: {
            type: "CLOSE_PLUGIN"
          }
        },
        "*"
      );
    };

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      output.textContent = JSON.stringify(msg, null, 2);
    };
  </script>
</body>
</html>
